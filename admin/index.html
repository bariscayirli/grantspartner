<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Grants Partner</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0B1D35; --text: #1D1D1F; --mid: #515154; --soft: #86868B;
      --border: #D2D2D7; --bg: #F5F5F7; --focus: #0066CC;
      --error-fg: #C0392B; --error-bg: #FFF5F5; --error-bd: #FECACA;
      --font: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card-top-rule {
      height: 3px;
      background: var(--navy);
      border-radius: 3px 3px 0 0;
      margin: -44px -40px 36px;
      border-radius: 17px 17px 0 0;
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .brand-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--soft);
      margin-bottom: 32px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--mid);
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 16px;
    }
    input[type="password"]:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(11,29,53,0.08);
    }
    button {
      width: 100%;
      padding: 13px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--navy);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .error-msg {
      font-size: 13px;
      font-weight: 500;
      color: var(--error-fg);
      background: var(--error-bg);
      border: 1px solid var(--error-bd);
      border-radius: 8px;
      padding: 10px 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show { display: block; }
    :focus-visible { outline: 2px solid var(--focus); outline-offset: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-top-rule"></div>
    <p class="brand">Grants Partner</p>
    <p class="brand-sub">Admin Panel</p>
    <h1>Sign in</h1>
    <div class="error-msg" id="errMsg"></div>
    <form id="loginForm" novalidate>
      <label for="pw">Admin password</label>
      <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" required />
      <button type="submit" id="btn">Sign in</button>
    </form>
  </div>

  <script type="module">
    import { setToken, getToken } from './admin.js';

    // Already logged in? Go to dashboard
    if (getToken()) location.href = '/admin/dashboard.html';

    const form   = document.getElementById('loginForm');
    const btn    = document.getElementById('btn');
    const errMsg = document.getElementById('errMsg');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      if (!pw) return;

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errMsg.classList.remove('show');

      try {
        const res  = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();

        if (res.ok) {
          setToken(data.token);
          location.href = '/admin/dashboard.html';
        } else {
          errMsg.textContent = 'Incorrect password. Please try again.';
          errMsg.classList.add('show');
        }
      } catch {
        errMsg.textContent = 'Could not connect. Please check your connection.';
        errMsg.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    });
  </script>
</body>
</html>
