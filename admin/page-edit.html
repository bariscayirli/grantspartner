<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Page — Grants Partner Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    .save-indicator { font-size: 11px; color: var(--soft); font-style: italic; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-brand-name">Grants Partner</span>
      <span class="sidebar-brand-tag">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <p class="nav-label">Data</p>
        <a href="/admin/dashboard.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8 0A1.5 1.5 0 0110.5 1h3A1.5 1.5 0 0115 2.5v3A1.5 1.5 0 0113.5 7h-3A1.5 1.5 0 019 5.5v-3zm-8 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8 0A1.5 1.5 0 0110.5 9h3A1.5 1.5 0 0115 10.5v3A1.5 1.5 0 0113.5 15h-3A1.5 1.5 0 019 13.5v-3z"/></svg>
          Dashboard
        </a>
        <a href="/admin/subscribers.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm2-3a2 2 0 11-4 0 2 2 0 014 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
          Subscribers
        </a>
      </div>
      <div class="nav-section">
        <p class="nav-label">Content</p>
        <a href="/admin/posts.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3a.5.5 0 01.5.5v9a.5.5 0 01-.5.5h-13a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h13zm-13-1A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h13a1.5 1.5 0 001.5-1.5v-9A1.5 1.5 0 0014.5 2h-13zM3 5.5a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h5a.5.5 0 010 1h-5a.5.5 0 01-.5-.5z"/></svg>
          Blog Posts
        </a>
        <a href="/admin/site-pages.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 4a.5.5 0 000 1h6a.5.5 0 000-1H5zm-.5 2.5A.5.5 0 015 6h6a.5.5 0 010 1H5a.5.5 0 01-.5-.5zM5 8a.5.5 0 000 1h6a.5.5 0 000-1H5zm0 2a.5.5 0 000 1h3a.5.5 0 000-1H5z"/><path d="M2 2a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V2zm10-1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V2a1 1 0 00-1-1z"/></svg>
          Pages
        </a>
        <a href="/admin/menu.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5z"/></svg>
          Menu
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">View live site</a>
      <button id="logoutBtn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="/admin/site-pages.html" class="btn btn-ghost btn-sm">Back</a>
        <span class="topbar-title" id="pageHeading">New Page</span>
      </div>
      <div class="topbar-actions">
        <span class="save-indicator" id="saveIndicator"></span>
        <button class="btn btn-ghost" id="saveDraftBtn">Save draft</button>
        <button class="btn btn-success" id="publishBtn">Publish</button>
      </div>
    </header>

    <div class="content">
      <div class="alert" id="alertMsg"></div>

      <div class="editor-layout">
        <div class="editor-main">
          <input
            type="text"
            class="editor-title-input"
            id="titleInput"
            placeholder="Page title"
            autocomplete="off"
          />

          <div class="toolbar-tabs">
            <button class="tab-btn active" id="writeTab">Write</button>
            <button class="tab-btn" id="previewTab">Preview</button>
          </div>

          <div class="toolbar" id="editorToolbar">
            <button class="toolbar-btn" data-before="**" data-after="**"><b>B</b></button>
            <button class="toolbar-btn" data-before="*" data-after="*"><i>I</i></button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-before="## ">H2</button>
            <button class="toolbar-btn" data-before="### ">H3</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-before="[" data-after="](url)">[L]</button>
            <button class="toolbar-btn" data-before="> ">&gt;</button>
            <button class="toolbar-btn" data-before="`" data-after="`">&lt;/&gt;</button>
            <div class="toolbar-sep"></div>
            <button class="toolbar-btn" data-before="- ">• List</button>
            <button class="toolbar-btn" data-before="1. ">1. List</button>
          </div>

          <div class="editor-content-area">
            <textarea
              class="editor-textarea"
              id="contentArea"
              placeholder="Write your page content here using Markdown..."
            ></textarea>
            <div class="preview-pane" id="previewPane"></div>
          </div>
        </div>

        <div class="editor-sidebar">
          <div class="sidebar-card">
            <div class="sidebar-card-title">Status</div>
            <div class="sidebar-card-body">
              <div class="status-strip">
                <div class="status-dot status-dot-draft" id="statusDot"></div>
                <span id="statusLabel">Draft</span>
              </div>
              <div style="font-size:12px;color:var(--soft)" id="publishedInfo"></div>
            </div>
          </div>

          <div class="sidebar-card">
            <div class="sidebar-card-title">URL Slug</div>
            <div class="sidebar-card-body">
              <label class="form-label" for="slugInput">grantspartner.com/</label>
              <input type="text" id="slugInput" placeholder="page-url" />
              <p class="form-hint">Auto-generated from title.</p>
            </div>
          </div>

          <div class="sidebar-card">
            <div class="sidebar-card-title">SEO Description</div>
            <div class="sidebar-card-body">
              <textarea id="metaInput" style="min-height:80px;font-size:13px" placeholder="Short description for search engines..."></textarea>
              <p class="form-hint">Shown in Google search results. 1-2 sentences.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { requireLogin, logout, api, markActiveNav, showAlert, makeSlug, mdToHtml, insertMd, formatDate } from './admin.js';
  if (!requireLogin()) throw new Error('not logged in');
  markActiveNav();
  document.getElementById('logoutBtn').addEventListener('click', logout);

  const params  = new URLSearchParams(location.search);
  const pageId  = params.get('id');

  const titleInput    = document.getElementById('titleInput');
  const contentArea   = document.getElementById('contentArea');
  const slugInput     = document.getElementById('slugInput');
  const metaInput     = document.getElementById('metaInput');
  const alertMsg      = document.getElementById('alertMsg');
  const saveIndicator = document.getElementById('saveIndicator');
  const statusDot     = document.getElementById('statusDot');
  const statusLabel   = document.getElementById('statusLabel');
  const publishedInfo = document.getElementById('publishedInfo');
  const pageHeading   = document.getElementById('pageHeading');

  let currentStatus = 'draft';
  let slugEdited = false;

  if (pageId) {
    pageHeading.textContent = 'Edit Page';
    api(`/api/admin/site-pages/${pageId}`).then(async res => {
      if (!res) return;
      const p = await res.json();
      titleInput.value   = p.title;
      contentArea.value  = p.content;
      slugInput.value    = p.slug;
      metaInput.value    = p.meta_description || '';
      slugEdited = true;
      setStatus(p.status);
      if (p.published_at) publishedInfo.textContent = `Published ${formatDate(p.published_at)}`;
    });
  }

  function setStatus(s) {
    currentStatus = s;
    statusLabel.textContent = s === 'published' ? 'Published' : 'Draft';
    statusDot.className = `status-dot status-dot-${s}`;
    document.getElementById('publishBtn').textContent = s === 'published' ? 'Update' : 'Publish';
  }

  titleInput.addEventListener('input', () => {
    if (!slugEdited) slugInput.value = makeSlug(titleInput.value);
  });
  slugInput.addEventListener('input', () => { slugEdited = true; });

  // Tabs
  document.getElementById('writeTab').addEventListener('click', () => {
    document.getElementById('writeTab').classList.add('active');
    document.getElementById('previewTab').classList.remove('active');
    contentArea.style.display = '';
    document.getElementById('editorToolbar').style.display = '';
    document.getElementById('previewPane').style.display = 'none';
  });

  document.getElementById('previewTab').addEventListener('click', () => {
    document.getElementById('previewTab').classList.add('active');
    document.getElementById('writeTab').classList.remove('active');
    contentArea.style.display = 'none';
    document.getElementById('editorToolbar').style.display = 'none';
    const pane = document.getElementById('previewPane');
    pane.style.display = 'block';
    pane.innerHTML = mdToHtml(contentArea.value) || '<p style="color:var(--soft)">Nothing to preview yet.</p>';
  });

  document.getElementById('editorToolbar').querySelectorAll('.toolbar-btn').forEach(btn => {
    btn.addEventListener('click', () => insertMd(contentArea, btn.dataset.before || '', btn.dataset.after || ''));
  });

  async function save(status) {
    const payload = {
      title:            titleInput.value.trim(),
      slug:             slugInput.value.trim() || makeSlug(titleInput.value),
      content:          contentArea.value,
      meta_description: metaInput.value.trim(),
      status,
    };

    if (!payload.title) {
      showAlert(alertMsg, 'error', 'Please enter a title before saving.');
      return;
    }

    const btn = document.getElementById(status === 'published' ? 'publishBtn' : 'saveDraftBtn');
    btn.disabled = true;
    saveIndicator.textContent = 'Saving...';

    let res;
    if (pageId) {
      res = await api(`/api/admin/site-pages/${pageId}`, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      res = await api('/api/admin/site-pages', { method: 'POST', body: JSON.stringify(payload) });
    }

    btn.disabled = false;
    if (!res) return;
    const data = await res.json();

    if (res.ok) {
      setStatus(status);
      saveIndicator.textContent = `Saved ${new Date().toLocaleTimeString()}`;
      showAlert(alertMsg, 'success', status === 'published' ? 'Page published.' : 'Draft saved.');
      if (!pageId && data.id) {
        history.replaceState({}, '', `/admin/page-edit.html?id=${data.id}`);
        pageHeading.textContent = 'Edit Page';
      }
      if (data.slug) slugInput.value = data.slug;
    } else {
      showAlert(alertMsg, 'error', data.error || 'Failed to save. Please try again.');
    }
  }

  document.getElementById('saveDraftBtn').addEventListener('click', () => save('draft'));
  document.getElementById('publishBtn').addEventListener('click', () => save('published'));
</script>
</body>
</html>
