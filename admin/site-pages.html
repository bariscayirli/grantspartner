<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pages — Grants Partner Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="stylesheet" href="/admin/admin.css" />
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-brand-name">Grants Partner</span>
      <span class="sidebar-brand-tag">Admin Panel</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">
        <p class="nav-label">Data</p>
        <a href="/admin/dashboard.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 012.5 1h3A1.5 1.5 0 017 2.5v3A1.5 1.5 0 015.5 7h-3A1.5 1.5 0 011 5.5v-3zm8 0A1.5 1.5 0 0110.5 1h3A1.5 1.5 0 0115 2.5v3A1.5 1.5 0 0113.5 7h-3A1.5 1.5 0 019 5.5v-3zm-8 8A1.5 1.5 0 012.5 9h3A1.5 1.5 0 017 10.5v3A1.5 1.5 0 015.5 15h-3A1.5 1.5 0 011 13.5v-3zm8 0A1.5 1.5 0 0110.5 9h3A1.5 1.5 0 0115 10.5v3A1.5 1.5 0 0113.5 15h-3A1.5 1.5 0 019 13.5v-3z"/></svg>
          Dashboard
        </a>
        <a href="/admin/subscribers.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm2-3a2 2 0 11-4 0 2 2 0 014 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
          Subscribers
        </a>
      </div>
      <div class="nav-section">
        <p class="nav-label">Content</p>
        <a href="/admin/posts.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M14.5 3a.5.5 0 01.5.5v9a.5.5 0 01-.5.5h-13a.5.5 0 01-.5-.5v-9a.5.5 0 01.5-.5h13zm-13-1A1.5 1.5 0 000 3.5v9A1.5 1.5 0 001.5 14h13a1.5 1.5 0 001.5-1.5v-9A1.5 1.5 0 0014.5 2h-13zM3 5.5a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h9a.5.5 0 010 1h-9a.5.5 0 01-.5-.5zm0 3a.5.5 0 01.5-.5h5a.5.5 0 010 1h-5a.5.5 0 01-.5-.5z"/></svg>
          Blog Posts
        </a>
        <a href="/admin/site-pages.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5 4a.5.5 0 000 1h6a.5.5 0 000-1H5zm-.5 2.5A.5.5 0 015 6h6a.5.5 0 010 1H5a.5.5 0 01-.5-.5zM5 8a.5.5 0 000 1h6a.5.5 0 000-1H5zm0 2a.5.5 0 000 1h3a.5.5 0 000-1H5z"/><path d="M2 2a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V2zm10-1H4a1 1 0 00-1 1v12a1 1 0 001 1h8a1 1 0 001-1V2a1 1 0 00-1-1z"/></svg>
          Pages
        </a>
        <a href="/admin/menu.html" class="nav-item">
          <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M2.5 12a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5zm0-4a.5.5 0 01.5-.5h10a.5.5 0 010 1H3a.5.5 0 01-.5-.5z"/></svg>
          Menu
        </a>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="/" target="_blank">View live site</a>
      <button id="logoutBtn">Sign out</button>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <span class="topbar-title">Pages</span>
      <div class="topbar-actions">
        <a href="/admin/page-edit.html" class="btn btn-primary btn-sm">+ New page</a>
      </div>
    </header>

    <div class="content">
      <div class="panel">
        <div class="panel-body table-wrap">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Slug</th>
                <th>Status</th>
                <th>Last updated</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--soft)">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="deleteOverlay">
  <div class="dialog">
    <h3>Delete page?</h3>
    <p>This cannot be undone. The page will be permanently removed.</p>
    <div class="dialog-actions">
      <button class="btn btn-ghost" id="cancelDelete">Cancel</button>
      <button class="btn btn-danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script type="module">
  import { requireLogin, logout, api, markActiveNav, formatDate } from './admin.js';
  if (!requireLogin()) throw new Error('not logged in');
  markActiveNav();
  document.getElementById('logoutBtn').addEventListener('click', logout);

  let deleteId = null;

  document.getElementById('cancelDelete').addEventListener('click', () => {
    document.getElementById('deleteOverlay').classList.remove('show');
    deleteId = null;
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    if (!deleteId) return;
    await api(`/api/admin/site-pages/${deleteId}`, { method: 'DELETE' });
    document.getElementById('deleteOverlay').classList.remove('show');
    deleteId = null;
    load();
  });

  async function load() {
    const res  = await api('/api/admin/site-pages');
    if (!res) return;
    const data = await res.json();
    const tbody = document.getElementById('tableBody');

    if (!data.pages?.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><p>No pages yet.</p><a href="/admin/page-edit.html" class="btn btn-primary btn-sm">Create your first page</a></div></td></tr>`;
      return;
    }

    tbody.innerHTML = data.pages.map(p => `
      <tr>
        <td class="td-primary">${esc(p.title)}</td>
        <td style="color:var(--soft);font-size:12px">/${esc(p.slug)}</td>
        <td><span class="badge badge-${p.status}">${p.status}</span></td>
        <td>${formatDate(p.updated_at)}</td>
        <td class="td-actions">
          <a href="/admin/page-edit.html?id=${p.id}" class="btn btn-ghost btn-sm">Edit</a>
          <button class="btn btn-danger btn-sm" data-id="${p.id}">Delete</button>
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('[data-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        deleteId = btn.dataset.id;
        document.getElementById('deleteOverlay').classList.add('show');
      });
    });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  load();
</script>
</body>
</html>
